<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Proposta Solar PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: #1e293b;
  padding: 25px;
  border-radius: 12px;
  width: 320px;
}

input {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  margin-top: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Proposta Solar</h2>

<input id="nome" placeholder="Nome do cliente">
<input id="endereco" placeholder="Endereço">
<input id="consumo" placeholder="Consumo médio (kWh)">
<input id="valor" placeholder="Valor do projeto">

<button onclick="gerarPDF()">Gerar PDF</button>
</div>

<script>
const { jsPDF } = window.jspdf;

function gerarPDF() {

const dados = {
  nome: document.getElementById("nome").value,
  endereco: document.getElementById("endereco").value,
  consumo: document.getElementById("consumo").value,
  valor: document.getElementById("valor").value
};

const doc = new jsPDF();

// ===== CORES =====
const azul = [30, 58, 138];
const verde = [34, 197, 94];

// ===== HEADER =====
doc.setFillColor(...azul);
doc.rect(0, 0, 210, 28, "F");

doc.setTextColor(255,255,255);
doc.setFontSize(14);
doc.setFont(undefined, "bold");
doc.text("BS ENERGIA SOLAR", 20, 15);

doc.setFontSize(10);
doc.setFont(undefined, "normal");
doc.text("Proposta Comercial", 20, 22);

// ===== LOGO (simulado) =====
doc.setFillColor(255,255,255);
doc.rect(160, 5, 30, 18); // espaço do logo
doc.setTextColor(0,0,0);
doc.setFontSize(8);
doc.text("LOGO", 170, 15);

// ===== CLIENTE =====
doc.setTextColor(0,0,0);
doc.setFontSize(10);
doc.text(dados.nome, 20, 40);
doc.text(dados.endereco, 20, 45, { maxWidth: 170 });

// ===== ANÁLISE =====
doc.setFontSize(12);
doc.setFont(undefined, "bold");
doc.text("ANÁLISE DO PROJETO", 20, 60);

doc.rect(15, 65, 180, 35);

doc.setFontSize(10);
doc.setFont(undefined, "normal");

doc.text(`Consumo médio: ${dados.consumo} kWh`, 20, 75);
doc.text("Aproveitamento: 97%", 20, 82);
doc.text("Posição solar: Norte", 20, 89);

// ===== PROJETO =====
doc.setFontSize(12);
doc.setFont(undefined, "bold");
doc.text("SEU PROJETO", 20, 110);

doc.rect(15, 115, 180, 35);

doc.setFontSize(10);
doc.setFont(undefined, "normal");

doc.text("Geração estimada: 554 kWh", 20, 125);
doc.text("Sistema: 5,85 kWp", 20, 132);
doc.text("Módulos: 10x 585W", 20, 139);

// ===== FINANCEIRO =====
doc.setFontSize(12);
doc.setFont(undefined, "bold");
doc.text("RETORNO FINANCEIRO", 20, 160);

doc.rect(15, 165, 180, 50);

const valorFormatado = Number(dados.valor || 0).toLocaleString("pt-BR", {
  style: "currency",
  currency: "BRL"
});

doc.setFontSize(12);
doc.setFont(undefined, "bold");
doc.text(valorFormatado, 20, 175);

doc.setFontSize(9);
doc.setFont(undefined, "normal");
doc.text("Valor do projeto", 20, 182);

// ===== GRÁFICO SIMULADO =====
let baseY = 210;

// eixo
doc.line(20, baseY, 190, baseY);
doc.line(20, baseY, 20, baseY - 40);

// barras (simulação crescimento economia)
doc.setFillColor(...verde);

let valores = [10, 20, 30, 50, 80];

valores.forEach((v, i) => {
  doc.rect(30 + i*25, baseY - v, 10, v, "F");
});

// labels
doc.setFontSize(8);
doc.text("5 anos", 30, baseY + 5);
doc.text("25 anos", 130, baseY + 5);

// ===== GANHOS =====
doc.setFontSize(10);
doc.setFont(undefined, "bold");
doc.text("Economia estimada:", 20, baseY - 45);

doc.setFontSize(9);
doc.setFont(undefined, "normal");
doc.text("R$ 22.807 em 5 anos", 20, baseY - 38);
doc.text("R$ 622.500 em 25 anos", 20, baseY - 32);

// ===== ASSINATURA =====
doc.line(20, 280, 80, 280);
doc.text("Assinatura", 20, 285);

doc.save(`proposta_${dados.nome}.pdf`);
}
</script>

</body>
</html>
