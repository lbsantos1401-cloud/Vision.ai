<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gerador de PDF</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {

      background:
        radial-gradient(circle at top,
          rgba(91, 140, 255, 0.15),
          transparent 30%),
        #0b0f19;

      color: white;

      min-height: 100vh;

      overflow-x: hidden;

      padding: 20px;
    }

    .background-glow {

      position: fixed;

      width: 600px;
      height: 600px;

      background: rgba(91, 140, 255, 0.12);

      filter: blur(120px);

      border-radius: 50%;

      top: -200px;
      left: -100px;

      z-index: -1;

      animation: floatGlow 10s ease-in-out infinite;
    }

    @keyframes floatGlow {

      0% {
        transform: translateY(0px) translateX(0px);
      }

      50% {
        transform: translateY(40px) translateX(30px);
      }

      100% {
        transform: translateY(0px) translateX(0px);
      }

    }

    .container {
      max-width: 1250px;
      margin: auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeIn 1s ease;
    }

    .logo {

      width: 90px;
      height: 90px;

      margin: auto;
      margin-bottom: 20px;

      border-radius: 30px;

      background:
        linear-gradient(135deg,
          #5b8cff,
          #7c5cff);

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 40px;

      box-shadow:
        0 0 40px rgba(91, 140, 255, 0.45);

      animation: pulse 4s infinite;
    }

    @keyframes pulse {

      0% {
        box-shadow: 0 0 30px rgba(91, 140, 255, 0.35);
      }

      50% {
        box-shadow: 0 0 55px rgba(91, 140, 255, 0.6);
      }

      100% {
        box-shadow: 0 0 30px rgba(91, 140, 255, 0.35);
      }

    }

    header h1 {
      font-size: 46px;
      margin-bottom: 12px;
      font-weight: bold;
    }

    header p {
      color: #9ca3af;
      font-size: 17px;
    }

    .upload-grid {

      display: grid;

      grid-template-columns:
        repeat(auto-fit, minmax(260px, 1fr));

      gap: 22px;
    }

    .upload-card {

      background: rgba(26, 29, 41, 0.8);

      backdrop-filter: blur(12px);

      border: 1px solid rgba(255,255,255,0.05);

      border-radius: 24px;

      padding: 20px;

      transition: 0.35s ease;

      animation: fadeUp 0.6s ease;
    }

    .upload-card:hover {

      transform:
        translateY(-6px)
        scale(1.01);

      border-color: rgba(91, 140, 255, 0.5);

      box-shadow:
        0 0 35px rgba(91, 140, 255, 0.2);
    }

    .upload-title {

      font-size: 18px;
      font-weight: bold;

      margin-bottom: 15px;
    }

    .upload-label {

      width: 100%;
      height: 200px;

      border-radius: 20px;

      border: 2px dashed #3a4257;

      display: flex;
      align-items: center;
      justify-content: center;

      cursor: pointer;

      overflow: hidden;

      position: relative;

      transition: 0.3s;

      background: rgba(255,255,255,0.02);
    }

    .upload-label:hover {

      border-color: #5b8cff;

      background: rgba(91,140,255,0.08);
    }

    .upload-label.dragover {

      border-color: #7aa2ff;

      background: rgba(91,140,255,0.15);

      transform: scale(1.02);
    }

    .upload-label span {

      color: #9ca3af;

      text-align: center;

      padding: 20px;

      font-size: 15px;
    }

    .upload-label img {

      width: 100%;
      height: 100%;

      object-fit: cover;

      transition: 0.4s;
    }

    .upload-label img:hover {
      transform: scale(1.04);
    }

    input[type="file"] {
      display: none;
    }

    #generateBtn {

      margin-top: 45px;

      width: 100%;

      padding: 20px;

      border: none;

      border-radius: 22px;

      background:
        linear-gradient(135deg,
          #5b8cff,
          #7c5cff);

      color: white;

      font-size: 18px;
      font-weight: bold;

      cursor: pointer;

      transition: 0.35s;

      position: relative;

      overflow: hidden;
    }

    #generateBtn:hover {

      transform: translateY(-3px);

      box-shadow:
        0 0 35px rgba(91,140,255,0.35);
    }

    #generateBtn.loading {

      pointer-events: none;

      opacity: 0.8;
    }

    .loader {

      width: 22px;
      height: 22px;

      border: 3px solid rgba(255,255,255,0.3);

      border-top: 3px solid white;

      border-radius: 50%;

      animation: spin 1s linear infinite;

      margin: auto;
    }

    @keyframes spin {

      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }

    }

    @keyframes fadeIn {

      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }

    }

    @keyframes fadeUp {

      from {
        opacity: 0;
        transform: translateY(25px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }

    }

    .footer {

      text-align: center;

      margin-top: 30px;

      color: #6b7280;

      font-size: 14px;
    }

    @media (max-width: 768px) {

      body {
        padding: 16px;
      }

      header h1 {
        font-size: 34px;
      }

      header p {
        font-size: 15px;
      }

      .upload-grid {
        gap: 16px;
      }

      .upload-label {
        height: 170px;
      }

      #generateBtn {
        padding: 18px;
      }

    }

  </style>
</head>

<body>

  <div class="background-glow"></div>

  <div class="container">

    <header>

      <div class="logo">
        📄
      </div>

      <h1>Gerador de PDF</h1>

      <p>
        Sistema inteligente para relatórios fotográficos
      </p>

    </header>

    <div id="uploadGrid" class="upload-grid"></div>

    <button id="generateBtn">
      Gerar PDF
    </button>

    <div class="footer">
      Powered by AI Workflow
    </div>

  </div>

  <script>

    const categorias = [
      "Estrutura",
      "Placas",
      "String Box CA Aberta",
      "String Box CC Aberta",
      "Inversor",
      "Aterramento",
      "Placa no Poste"
    ];

    const imagens = [];

    const uploadGrid =
      document.getElementById("uploadGrid");


    categorias.forEach((categoria, index) => {

      const card =
        document.createElement("div");

      card.classList.add("upload-card");

      card.innerHTML = `
      
        <div class="upload-title">
          ${index + 1}. ${categoria}
        </div>

        <label class="upload-label" for="file-${index}">
          <span>
            Clique ou arraste uma imagem
          </span>
        </label>

        <input
          type="file"
          id="file-${index}"
          accept="image/*"
        >
      
      `;

      uploadGrid.appendChild(card);

      const input =
        card.querySelector("input");

      const label =
        card.querySelector(".upload-label");


      // CLICK NORMAL

      input.addEventListener(
        "change",
        (event) => {

          const file =
            event.target.files[0];

          if (file) {
            processarImagem(file, index, label);
          }

        }
      );


      // DRAG AND DROP

      label.addEventListener(
        "dragover",
        (e) => {

          e.preventDefault();

          label.classList.add("dragover");

        }
      );

      label.addEventListener(
        "dragleave",
        () => {

          label.classList.remove("dragover");

        }
      );

      label.addEventListener(
        "drop",
        (e) => {

          e.preventDefault();

          label.classList.remove("dragover");

          const file =
            e.dataTransfer.files[0];

          if (file) {
            processarImagem(file, index, label);
          }

        }
      );

    });


    // ==========================
    // COMPRESSÃO AUTOMÁTICA
    // ==========================

    function processarImagem(file, index, label) {

      const reader = new FileReader();

      reader.onload = function(event) {

        const img = new Image();

        img.src = event.target.result;

        img.onload = function() {

          const canvas =
            document.createElement("canvas");

          const ctx =
            canvas.getContext("2d");

          const maxWidth = 1400;

          let width = img.width;
          let height = img.height;

          if (width > maxWidth) {

            height *= maxWidth / width;

            width = maxWidth;
          }

          canvas.width = width;
          canvas.height = height;

          ctx.drawImage(
            img,
            0,
            0,
            width,
            height
          );

          const compressed =
            canvas.toDataURL(
              "image/jpeg",
              0.75
            );

          imagens[index] = compressed;

          label.innerHTML = `
            <img src="${compressed}">
          `;

        };

      };

      reader.readAsDataURL(file);

    }


    // ==========================
    // GERAR PDF
    // ==========================

    const generateBtn =
      document.getElementById("generateBtn");

    generateBtn.addEventListener(
      "click",
      gerarPDF
    );


    async function gerarPDF() {

      if (
        imagens.filter(Boolean).length === 0
      ) {

        alert(
          "Adicione pelo menos uma imagem."
        );

        return;
      }

      generateBtn.classList.add("loading");

      generateBtn.innerHTML =
        `<div class="loader"></div>`;


      setTimeout(() => {

        const { jsPDF } = window.jspdf;

        const pdf = new jsPDF({
          orientation: "portrait",
          unit: "mm",
          format: "a4"
        });

        let primeiraPagina = true;

        for (let i = 0; i < categorias.length; i++) {

          const imagem = imagens[i];

          if (!imagem) continue;

          if (!primeiraPagina) {
            pdf.addPage();
          }

          primeiraPagina = false;

          // FUNDO

          pdf.setFillColor(11, 15, 25);

          pdf.rect(
            0,
            0,
            210,
            297,
            "F"
          );

          // TÍTULO

          pdf.setTextColor(255,255,255);

          pdf.setFontSize(22);

          pdf.text(
            categorias[i],
            105,
            20,
            {
              align: "center"
            }
          );

          // IMAGEM

          const imgProps =
            pdf.getImageProperties(imagem);

          const pdfWidth = 180;

          const pdfHeight =
            (imgProps.height * pdfWidth)
            / imgProps.width;

          pdf.addImage(
            imagem,
            "JPEG",
            15,
            35,
            pdfWidth,
            pdfHeight
          );

        }

        pdf.save(
          "relatorio-fotografico.pdf"
        );

        generateBtn.classList.remove("loading");

        generateBtn.innerHTML =
          "Gerar PDF";

      }, 800);

    }

  </script>

</body>

</html>
