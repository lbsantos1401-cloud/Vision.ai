<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Orçamento Profissional</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: #1e293b;
  padding: 25px;
  border-radius: 12px;
  width: 340px;
}

h2 {
  color: white;
}

input {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 6px;
  margin-top: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Gerar Orçamento</h2>

<input id="servico" placeholder="Tipo de serviço">
<input id="tempo" placeholder="Tempo estimado">
<input id="material" placeholder="Material necessário">
<input id="valorMaterial" placeholder="Valor médio do material">
<input id="maoDeObra" placeholder="Valor da mão de obra">
<input id="valorTotal" placeholder="Valor total">

<button onclick="gerarPDF()">Gerar PDF</button>
</div>

<script>
const { jsPDF } = window.jspdf;

function gerarPDF() {

const dados = {
  servico: document.getElementById("servico").value,
  tempo: document.getElementById("tempo").value,
  material: document.getElementById("material").value,
  valorMaterial: document.getElementById("valorMaterial").value,
  maoDeObra: document.getElementById("maoDeObra").value,
  valorTotal: document.getElementById("valorTotal").value
};

const doc = new jsPDF();

// ===== CORES =====
const azul = [30, 58, 138];

// ===== LOGO (SUBSTITUIR BASE64) =====
const logoBase64 = ""; // COLE AQUI SUA LOGO EM BASE64

if (logoBase64) {
  doc.addImage(logoBase64, "PNG", 15, 10, 40, 20);
}

// ===== HEADER =====
doc.setFillColor(...azul);
doc.rect(0, 0, 210, 35, "F");

doc.setTextColor(255,255,255);
doc.setFontSize(14);
doc.setFont(undefined, "bold");
doc.text("ORÇAMENTO DE SERVIÇO", 105, 20, { align: "center" });

doc.setTextColor(0,0,0);

// ===== DATA =====
doc.setFontSize(10);
doc.text("Data: " + new Date().toLocaleDateString(), 150, 45);

// ===== BLOCO PRINCIPAL =====
doc.setFontSize(12);
doc.setFont(undefined, "bold");
doc.text("DETALHES DO SERVIÇO", 20, 60);

doc.rect(15, 65, 180, 100);

let y = 75;

doc.setFontSize(10);
doc.setFont(undefined, "normal");

// ===== FUNÇÃO PRA EXIBIR APENAS SE PREENCHIDO =====
function addLinha(label, valor) {
  if (valor) {
    doc.setFont(undefined, "bold");
    doc.text(label, 20, y);

    doc.setFont(undefined, "normal");
    doc.text(valor, 80, y, { maxWidth: 100 });

    y += 8;
  }
}

addLinha("Tipo de serviço:", dados.servico);
addLinha("Tempo estimado:", dados.tempo);
addLinha("Material necessário:", dados.material);
addLinha("Valor do material:", dados.valorMaterial);
addLinha("Mão de obra:", dados.maoDeObra);

// ===== VALOR TOTAL DESTACADO =====
if (dados.valorTotal) {
  y += 10;

  doc.setFontSize(12);
  doc.setFont(undefined, "bold");

  const valorFormatado = Number(dados.valorTotal || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });

  doc.text("VALOR TOTAL:", 20, y);
  doc.text(valorFormatado, 80, y);
}

// ===== RODAPÉ =====
doc.setFontSize(9);
doc.setFont(undefined, "normal");
doc.text("Orçamento válido por 7 dias.", 20, 280);

// ===== ASSINATURA =====
doc.line(20, 260, 80, 260);
doc.text("Assinatura", 20, 265);

doc.save("orcamento.pdf");
}
</script>

</body>
</html>
