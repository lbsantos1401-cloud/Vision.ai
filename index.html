<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Orçamento</title>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 12px;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Gerar Proposta</h1>

  <input id="nome" placeholder="Nome do cliente">
  <input id="endereco" placeholder="Endereço">
  <input id="consumo" placeholder="Consumo médio (kWh)">
  <input id="verao" placeholder="Consumo verão">
  <input id="inverno" placeholder="Consumo inverno">
  <input id="area" placeholder="Área disponível (m²)">
  <input id="valor" placeholder="Valor do projeto">

  <button onclick="gerarPDF()">Gerar PDF</button>
</div>

      inverno: document.getElementById("inverno").value,
      area: document.getElementById("area").value,
      valor: document.getElementById("valor").value

    doc.setFontSize(18);

    doc.setFontSize(14);
